repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest (unit)
        entry: pytest -q tests/unit
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-integration
        name: pytest (integration)
        entry: pytest -q tests/integration
        language: system
        pass_filenames: false
        stages: [manual]
