version: "3.8"

services:
    minio:
        image: minio/minio:latest
        container_name: minio
        ports:
            - "9000:9000"
            - "9001:9001"
        environment:
            MINIO_ROOT_USER: tokenrtvr
            MINIO_ROOT_PASSWORD: development-tokenrtvr
        command: server /data --console-address ":9001"
        volumes:
            - minio_data:/data
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
            interval: 10s
            timeout: 5s
            retries: 5

    mongo:
        image: mongo:6
        container_name: mongo
        ports:
            - "27017:27017"
        environment:
            MONGO_INITDB_ROOT_USERNAME: tokenrtvr
            MONGO_INITDB_ROOT_PASSWORD: development-tokenrtvr

        volumes:
            - mongo_data:/data/db
        healthcheck:
            test: ["CMD", "mongosh", "--username", "tokenrtvr", "--password", "development-tokenrtvr", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
            interval: 10s
            timeout: 5s
            retries: 5

    qdrant:
        image: qdrant/qdrant:latest
        container_name: qdrant
        ports:
            - "6333:6333"
        volumes:
            - qdrant_data:/qdrant/storage
        healthcheck:
            disable: true

volumes:
    minio_data:
    mongo_data:
    qdrant_data: